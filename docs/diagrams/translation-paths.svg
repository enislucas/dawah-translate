<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#60a5fa"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-auto">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f8fafc" font-size="18" font-weight="700">Translation Paths: Claude API vs NLLB-200 Local</text>

  <!-- Input -->
  <rect x="300" y="60" width="200" height="50" rx="8" fill="#1e293b" stroke="#60a5fa" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">SOURCE SRT</text>
  <text x="400" y="100" text-anchor="middle" fill="#94a3b8" font-size="10">transcript_original.srt</text>

  <!-- Fork arrows -->
  <line x1="350" y1="110" x2="200" y2="150" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="110" x2="600" y2="150" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PATH A: Claude API -->
  <rect x="50" y="155" width="300" height="45" rx="8" fill="#1e293b" stroke="#c084fc" stroke-width="2"/>
  <text x="200" y="175" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="700">Path A: Claude API</text>
  <text x="200" y="192" text-anchor="middle" fill="#94a3b8" font-size="10">Paid · Higher quality · Context-aware</text>

  <line x1="200" y1="200" x2="200" y2="225" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="70" y="230" width="260" height="70" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="200" y="253" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">System Prompt + Glossary</text>
  <text x="200" y="270" text-anchor="middle" fill="#94a3b8" font-size="9">Batch of 50 segments + 5 context segments</text>
  <text x="200" y="285" text-anchor="middle" fill="#94a3b8" font-size="9">Character limits from segment duration</text>
  <text x="200" y="295" text-anchor="middle" fill="#7dd3fc" font-size="9" font-family="monospace">claude-sonnet-4 / claude-opus-4</text>

  <line x1="200" y1="300" x2="200" y2="325" stroke="#c084fc" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="80" y="330" width="240" height="50" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="200" y="350" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">Normalize Romanian</text>
  <text x="200" y="368" text-anchor="middle" fill="#94a3b8" font-size="9">ş→ș, ţ→ț (cedilla → comma-below)</text>

  <!-- PATH B: NLLB Local -->
  <rect x="450" y="155" width="300" height="45" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="2"/>
  <text x="600" y="175" text-anchor="middle" fill="#fbbf24" font-size="13" font-weight="700">Path B: NLLB-200 Local</text>
  <text x="600" y="192" text-anchor="middle" fill="#94a3b8" font-size="10">Free · Offline · ~400 MB model</text>

  <line x1="600" y1="200" x2="600" y2="225" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="470" y="230" width="260" height="55" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="600" y="250" text-anchor="middle" fill="#f1f5f9" font-size="11" font-weight="600">CTranslate2 Translation</text>
  <text x="600" y="268" text-anchor="middle" fill="#94a3b8" font-size="9">nllb-200-distilled-600M (int8)</text>
  <text x="600" y="280" text-anchor="middle" fill="#94a3b8" font-size="9">Batch of 20, beam size 5</text>

  <line x1="600" y1="285" x2="600" y2="310" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="470" y="315" width="260" height="65" rx="8" fill="#1e293b" stroke="#c084fc" stroke-width="1.5"/>
  <text x="600" y="335" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="600">Glossary Post-Processing</text>
  <text x="600" y="352" text-anchor="middle" fill="#94a3b8" font-size="9">Scan source for Arabic terms</text>
  <text x="600" y="365" text-anchor="middle" fill="#94a3b8" font-size="9">Find NLLB output → replace with transliteration</text>
  <text x="600" y="375" text-anchor="middle" fill="#7dd3fc" font-size="9">"rugaciune" → "Salah (rugaciunea rituala)"</text>

  <!-- Merge -->
  <line x1="200" y1="380" x2="200" y2="420" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="600" y1="380" x2="600" y2="420" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="200" y1="420" x2="600" y2="420" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="400" y1="420" x2="400" y2="445" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Output -->
  <rect x="280" y="450" width="240" height="40" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="400" y="468" text-anchor="middle" fill="#4ade80" font-size="12" font-weight="700">transcript_romanian.srt</text>
  <text x="400" y="483" text-anchor="middle" fill="#94a3b8" font-size="9">Ready for human review</text>
</svg>
